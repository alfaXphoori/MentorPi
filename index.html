<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MentorPi M1 | ประสบการณ์เรียนรู้หุ่นยนต์ระดับพรีเมียม</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --tesla-black: #171a20; --tesla-gray: #393c41; --tesla-white: #ffffff; --earth-bg: #fcfaf7; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', 'Sarabun', -apple-system, sans-serif; }
        body { background-color: var(--earth-bg); color: var(--tesla-black); overflow-x: hidden; }
        
        /* Nav */
        nav { position: fixed; top: 0; width: 100%; padding: 0 40px; height: 56px; display: flex; justify-content: space-between; align-items: center; z-index: 1000; transition: background 0.3s; }
        .nav-links { display: flex; gap: 30px; list-style: none; }
        .nav-links a { text-decoration: none; color: var(--tesla-black); font-size: 0.9rem; font-weight: 600; transition: color 0.3s; }
        .nav-links a:hover { color: var(--tesla-gray); background: rgba(0,0,0,0.05); padding: 5px 15px; border-radius: 4px; margin: -5px -15px; }
        .logo { font-weight: 600; letter-spacing: 2px; font-size: 1.1rem; text-decoration: none; color: inherit; }

        /* Hero Section */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 120px 20px 40px;
            background: linear-gradient(rgba(252, 250, 247, 0.4), rgba(252, 250, 247, 0.4)), 
                        url('https://media.robotshop.com/main/h/hiw/hiwonder-mentorpi-m1-raspberry-pi-5-robot-car-mecanum-wheel-chassis-2dof-monocular-camera-ros2-humble-support-slam-and-autonomous-driving/hiwonder-mentorpi-m1-raspberry-pi-5-robot-car-mecanum-wheel-chassis-2dof-monocular-camera-ros2-humble-support-slam-and-autonomous-driving-1.jpg');
            background-size: cover;
            background-position: center;
            text-align: center;
        }
        
        .hero-text h1 { font-size: 3rem; font-weight: 600; letter-spacing: -1px; margin-bottom: 10px; color: var(--tesla-black); }
        .hero-text p { font-size: 1.1rem; color: var(--tesla-gray); }

        .cta-container { display: flex; flex-direction: column; gap: 15px; width: 100%; max-width: 600px; padding: 0 20px; }
        .btn { 
            padding: 12px 0; 
            border-radius: 4px; 
            text-decoration: none; 
            font-size: 0.9rem; 
            font-weight: 600; 
            transition: all 0.3s ease;
            text-transform: uppercase;
        }
        .btn-primary { background: rgba(23, 26, 32, 0.8); color: white; backdrop-filter: blur(8px); }
        .btn-secondary { background: rgba(244, 244, 244, 0.65); color: var(--tesla-gray); backdrop-filter: blur(8px); }
        .btn:hover { opacity: 0.8; transform: scale(1.01); }

        @media (max-width: 768px) {
            .nav-links { display: none; }
            .hero-text h1 { font-size: 2.5rem; }
        }

        @media (min-width: 769px) {
            .cta-container { flex-direction: row; }
            .btn { flex: 1; }
            .hero-text h1 { font-size: 3.5rem; }
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="logo">
            <img src="https://docs.hiwonder.com/projects/MentorPi/en/latest/_static/logo.png" alt="MentorPi Logo" style="height: 30px; vertical-align: middle; margin-right: 10px;">
            MENTORPI M1
        </a>
        <ul class="nav-links">
            <li><a href="intro.html">วิศวกรรม</a></li>
            <li><a href="schedule.html">ตารางอบรม</a></li>
            <li><a href="https://github.com/alfaXphoori/MentorPi">GitHub</a></li>
        </ul>
        <div style="width: 100px;"></div>
    </nav>

    <section class="hero">
        <div class="hero-text">
            <h1>MentorPi M1</h1>
            <p>นิยามใหม่แห่งการเรียนรู้ ROS2 และ AI</p>
        </div>

        <div class="cta-container">
            <a href="intro.html" class="btn btn-primary">สัมผัสประสบการณ์</a>
            <a href="schedule.html" class="btn btn-secondary">ตารางการอบรม</a>
        </div>
    </section>

    <footer>
        <div style="padding: 20px; text-align: center; color: var(--tesla-gray); font-size: 0.8rem;">
            MentorPi Training © 2026
        </div>
    </footer>
</body>
</html>
